<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Connect — browser-based remote access for Pi &amp; Linux devices">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="55%" stop-color="#10141c"/>
      <stop offset="100%" stop-color="#0a0c0f"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1e2330" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="100%" stop-color="#a7c6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ea8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6ea8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- reusable connection path -->
    <path id="wire" d="M 304 186 C 470 150, 820 232, 984 188"/>
    <path id="wireRev" d="M 984 188 C 820 232, 470 150, 304 186"/>
  </defs>

  <!-- layered background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.55"/>

  <!-- ambient glow behind device -->
  <circle cx="220" cy="186" r="170" fill="url(#glow)" opacity="0.35"/>
  <!-- ambient glow behind browser -->
  <circle cx="1000" cy="190" r="160" fill="url(#glow)" opacity="0.22"/>

  <!-- scanner rings around device -->
  <g stroke="#6ea8ff" fill="none">
    <circle cx="220" cy="186" r="60" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="42;110;42" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="186" r="60" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="42;110;42" dur="4.2s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4.2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="186" r="60" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="42;110;42" dur="4.2s" begin="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="4.2s" begin="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- wire (visible connection) -->
  <use href="#wire" stroke="#364258" stroke-width="1.5" fill="none" stroke-dasharray="5 5" opacity="0.75"/>

  <!-- forward pulses (device -> browser) cyan -->
  <g filter="url(#softGlow)">
    <circle r="4" fill="#6ea8ff">
      <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#wire"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#6ea8ff">
      <animateMotion dur="2.4s" begin="0.8s" repeatCount="indefinite"><mpath href="#wire"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#6ea8ff">
      <animateMotion dur="2.4s" begin="1.6s" repeatCount="indefinite"><mpath href="#wire"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- reverse pulses (browser -> device) green — input events -->
  <g filter="url(#softGlow)">
    <circle r="3" fill="#55c57a">
      <animateMotion dur="3.2s" begin="0.4s" repeatCount="indefinite"><mpath href="#wireRev"/></animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.08;0.92;1" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#55c57a">
      <animateMotion dur="3.2s" begin="2.0s" repeatCount="indefinite"><mpath href="#wireRev"/></animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.08;0.92;1" dur="3.2s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- device -->
  <g transform="translate(220, 186)">
    <!-- board -->
    <rect x="-58" y="-40" width="116" height="80" rx="5" fill="#161a22" stroke="#2a3040"/>
    <!-- SoC -->
    <rect x="-22" y="-14" width="44" height="30" rx="2" fill="#0a0c0f" stroke="#6ea8ff" stroke-width="0.7"/>
    <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="7" fill="#6ea8ff" letter-spacing="0.06em">BCM2712</text>
    <!-- traces -->
    <g stroke="#2a3040">
      <line x1="-58" y1="-26" x2="-24" y2="-26"/>
      <line x1="24" y1="-26" x2="58" y2="-26"/>
      <line x1="-58" y1="26" x2="-24" y2="26"/>
      <line x1="24" y1="26" x2="58" y2="26"/>
      <line x1="-40" y1="-40" x2="-40" y2="-14"/>
      <line x1="40" y1="40" x2="40" y2="14"/>
    </g>
    <!-- GPIO pins (top) -->
    <g fill="#4a5565">
      <rect x="-50" y="-38" width="2" height="4"/>
      <rect x="-46" y="-38" width="2" height="4"/>
      <rect x="-42" y="-38" width="2" height="4"/>
      <rect x="-38" y="-38" width="2" height="4"/>
      <rect x="-34" y="-38" width="2" height="4"/>
      <rect x="-30" y="-38" width="2" height="4"/>
      <rect x="-26" y="-38" width="2" height="4"/>
    </g>
    <!-- USB port -->
    <rect x="40" y="-36" width="16" height="10" rx="1" fill="#0a0c0f" stroke="#2a3040"/>
    <!-- ethernet -->
    <rect x="40" y="22" width="16" height="14" rx="1" fill="#0a0c0f" stroke="#2a3040"/>
    <!-- activity LED (blinks) -->
    <circle cx="-44" cy="30" r="3" fill="#55c57a" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.25;1;0.25;1;0.25" keyTimes="0;0.15;0.5;0.65;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <!-- power LED (steady red) -->
    <circle cx="-34" cy="30" r="2.5" fill="#e06060">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- browser window -->
  <g transform="translate(1000, 186)">
    <!-- frame -->
    <rect x="-108" y="-76" width="216" height="150" rx="7" fill="#13171f" stroke="#2a3040"/>
    <!-- title bar -->
    <rect x="-108" y="-76" width="216" height="22" rx="7" fill="#0f1319"/>
    <rect x="-108" y="-64" width="216" height="8" fill="#0f1319"/>
    <!-- traffic lights -->
    <circle cx="-92" cy="-65" r="3.2" fill="#e06060"/>
    <circle cx="-80" cy="-65" r="3.2" fill="#d4a85b"/>
    <circle cx="-68" cy="-65" r="3.2" fill="#55c57a"/>
    <!-- url bar -->
    <rect x="-50" y="-70" width="150" height="11" rx="3" fill="#0a0c0f"/>
    <text x="25" y="-62" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="7" fill="#6ea8ff">connect.local/session</text>
    <!-- terminal content -->
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9">
      <text x="-98" y="-38" fill="#55c57a">$ whoami</text>
      <text x="-98" y="-24" fill="#c9ced6">pi</text>
      <text x="-98" y="-10" fill="#55c57a">$ uname -sr</text>
      <text x="-98" y="4"  fill="#c9ced6">Linux 6.6.20</text>
      <text x="-98" y="18" fill="#55c57a">$ echo hello</text>
      <text x="-98" y="32" fill="#c9ced6">hello</text>
      <text x="-98" y="46" fill="#55c57a">$</text>
    </g>
    <!-- blinking cursor -->
    <rect x="-90" y="39" width="7" height="10" fill="#6ea8ff">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.49;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- wordmark and tagline -->
  <g transform="translate(640, 56)">
    <text text-anchor="middle" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="-0.01em">Connect</text>
    <text y="22" text-anchor="middle" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="12" fill="#8a94a8" letter-spacing="0.18em">SELF-HOSTED · BROWSER-BASED · NO PORT FORWARDING</text>
  </g>

  <!-- technical sub-labels, top corners -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4a5565">
    <text x="32" y="30">// device-agent</text>
    <text x="1248" y="30" text-anchor="end">browser-client //</text>
  </g>

  <!-- bottom technical band -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4a5565">
    <text x="32" y="296">WebRTC · DTLS-SRTP · ICE · STUN/TURN</text>
    <text x="1248" y="296" text-anchor="end">Go · Pion · xterm.js · SQLite</text>
  </g>

  <!-- small floating particles -->
  <g fill="#6ea8ff">
    <circle cx="560" cy="110" r="1.3" opacity="0.4">
      <animate attributeName="cy" values="110;90;110" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="250" r="1.3" opacity="0.4">
      <animate attributeName="cy" values="250;230;250" dur="4.5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="240" r="1.3" opacity="0.4">
      <animate attributeName="cy" values="240;220;240" dur="6s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="6s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="120" r="1.3" opacity="0.4">
      <animate attributeName="cy" values="120;100;120" dur="5.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
